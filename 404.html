<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Rumbo No Encontrado | ITB Maritime Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--navy);
            color: var(--white);
            padding: 2rem;
            flex-direction: column;
        }
        .error-content {
            max-width: 600px;
        }
        .error-icon {
            font-size: 6rem;
            color: var(--gold);
            margin-bottom: 2rem;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        .error-content h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--gold);
        }
        .error-content p {
            font-size: 1.2rem;
            color: var(--blue-light);
            margin-bottom: 2.5rem;
        }
        .btn-home {
            display: inline-block;
            padding: 1rem 2rem;
            background: var(--gold);
            color: var(--navy);
            text-decoration: none;
            font-weight: 700;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-home:hover {
            background: var(--white);
            transform: scale(1.05);
        }
        .watermark-404 {
            position: absolute;
            font-size: 20vw;
            font-weight: 900;
            opacity: 0.03;
            z-index: 0;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="watermark-404">404</div>
        <div class="error-content">
            <div class="error-icon">
                <i class="ph ph-anchor"></i>
            </div>
            <h1>Rumbo Perdido</h1>
            <p>Parece que las coordenadas no son correctas. Esta página ha zarpado hacia otros puertos o nunca existió.</p>
            <a href="index.html" class="btn-home">Volver a Puerto Seguro</a>
        </div>
    </div>
</body>
</html>
